name: Release (prepare)

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  id-token: write # Required for npm OIDC trusted publishing

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  prepare:
    if: github.repository == '0xjgv/spok'
    runs-on: ubuntu-latest
    env:
      RELEASE_APP_ID: ${{ vars.APP_ID }}
      RELEASE_APP_PRIVATE_KEY: ${{ secrets.APP_PRIVATE_KEY }}
    steps:
      # Generate GitHub App token first - used for checkout and changesets
      # This allows git operations to trigger CI workflows on the version PR
      # (GITHUB_TOKEN cannot trigger workflows by design)
      - name: Generate GitHub App Token
        id: app-token
        if: env.RELEASE_APP_ID != '' && env.RELEASE_APP_PRIVATE_KEY != ''
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ env.RELEASE_APP_ID }}
          private-key: ${{ env.RELEASE_APP_PRIVATE_KEY }}

      - name: Warn when GitHub App credentials are missing
        if: env.RELEASE_APP_ID == '' || env.RELEASE_APP_PRIVATE_KEY == ''
        run: |
          echo "::warning::APP_ID or APP_PRIVATE_KEY is not configured; using GITHUB_TOKEN fallback for release preparation."

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token || github.token }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # Node + npm are still needed for `npm publish` via changesets/action,
      # and Node 24 ships npm 11.5.1+ which supports OIDC trusted publishing.
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - run: bun install --frozen-lockfile

      # Opens/updates the Version Packages PR; publishes when the Version PR merges
      - name: Create/Update Version PR
        id: changesets
        if: env.RELEASE_APP_ID != '' && env.RELEASE_APP_PRIVATE_KEY != ''
        uses: changesets/action@v1
        with:
          title: 'chore(release): version packages'
          createGithubReleases: true
          # Use CI-specific release script: relies on version PR having been merged
          # so package.json already contains the bumped version.
          publish: bun run release:ci
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token || github.token }}
          # npm authentication handled via OIDC trusted publishing (no token needed)
